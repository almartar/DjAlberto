<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Booking</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 20px;
}

h2 { text-align:center; }

/* CALENDARIO */
#calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  max-width: 500px;
  margin: auto;
}

.day {
  padding: 10px;
  text-align: center;
  border-radius: 8px;
  background: #f2f2f2;
  cursor: pointer;
}

.day:hover {
  background: #ddd;
}

.selected {
  background: #25D366;
  color: white;
}

/* HORAS */
#panel {
  max-width: 500px;
  margin: 20px auto;
  text-align: center;
}

.hour {
  display: inline-block;
  padding: 8px 12px;
  margin: 5px;
  border-radius: 6px;
  background: #eee;
  cursor: pointer;
}

.hour.taken {
  background: #999;
  color: white;
  cursor: not-allowed;
}

.hour.selected {
  background: #25D366;
  color: white;
}

/* BOTÓN WHATSAPP */
#sendBtn {
  margin-top: 15px;
  padding: 12px;
  background: #25D366;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* BOTÓN FLOTANTE */
#waFloat{
  position:fixed;
  bottom:90px;
  right:14px;
  width:58px;
  height:58px;
  background:#25D366;
  color:#fff;
  font-size:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  text-decoration:none;
  box-shadow:0 8px 20px rgba(0,0,0,.3);
  z-index:9999;
}

@media(max-width:768px){
  #waFloat{
    width:54px;
    height:54px;
    font-size:24px;
  }
}

html, body {
  overflow-x: hidden;
}
</style>
</head>

<body>

<h2>Reserva tu fecha</h2>

<div id="calendar"></div>

<div id="panel">
  <h3 id="selectedDate">Selecciona un día</h3>
  <div id="hours"></div>
  <button id="sendBtn">Enviar al DJ por WhatsApp</button>
</div>

<a href="https://wa.me/34658023238" target="_blank" id="waFloat">💬</a>

<script>
const hoursList = ["10:00","12:00","14:00","16:00","18:00","20:00","22:00"];

let selectedDate = null;
let selectedHour = null;

const calendar = document.getElementById("calendar");
const hoursDiv = document.getElementById("hours");
const selectedDateText = document.getElementById("selectedDate");

const isAdmin = window.location.search.includes("admin=1");

// storage bloqueos
function getBlocked(){
  return JSON.parse(localStorage.getItem("blocked") || "{}");
}
function saveBlocked(data){
  localStorage.setItem("blocked", JSON.stringify(data));
}

// generar calendario simple (30 días)
for(let i=1;i<=30;i++){
  const div = document.createElement("div");
  div.className = "day";
  div.innerText = i;

  div.onclick = () => {
    document.querySelectorAll(".day").forEach(d=>d.classList.remove("selected"));
    div.classList.add("selected");

    selectedDate = "2026-04-" + String(i).padStart(2,"0");
    selectedHour = null;

    selectedDateText.innerText = "Día: " + selectedDate;

    renderHours();
  };

  calendar.appendChild(div);
}

// horas
function renderHours(){
  hoursDiv.innerHTML = "";
  const blocked = getBlocked();

  hoursList.forEach(h => {
    const div = document.createElement("div");
    div.className = "hour";
    div.innerText = h;

    const key = selectedDate + "_" + h;

    if(blocked[key]){
      div.classList.add("taken");
    }

    div.onclick = () => {
      if(div.classList.contains("taken")) return;

      document.querySelectorAll(".hour").forEach(x=>x.classList.remove("selected"));
      div.classList.add("selected");
      selectedHour = h;

      // ADMIN: bloquear hora
      if(isAdmin){
        blocked[key] = true;
        saveBlocked(blocked);
        alert("Hora bloqueada");
        renderHours();
      }
    };

    hoursDiv.appendChild(div);
  });
}

// enviar WhatsApp
document.getElementById("sendBtn").onclick = () => {
  if(!selectedDate || !selectedHour){
    alert("Selecciona día y hora");
    return;
  }

  const msg = `Hola, quiero reservar DJ el día ${selectedDate} a las ${selectedHour}`;
  const url = "https://wa.me/34658023238?text=" + encodeURIComponent(msg);

  window.open(url, "_blank");
};
</script>

</body>
</html>
